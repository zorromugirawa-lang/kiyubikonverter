<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to Word - Premium Converter</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Libraries with Fallback System -->
    <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.4.120/build/pdf.min.js" 
            onerror="this.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js'"></script>
    <script src="https://cdn.jsdelivr.net/npm/docx@7.1.1/build/index.js" 
            onerror="this.src='https://unpkg.com/docx@7.1.1/build/index.js'"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --secondary: #7c3aed;
            --bg-body: #f8fafc;
            --container-bg: #ffffff;
            --glass-border: rgba(0, 0, 0, 0.05);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --drop-zone-bg: #f1f5f9;
            --success: #22c55e;
            --error: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0;
        }

        /* Navigation Header */
        .main-nav {
            width: 100%;
            background: #ffffff;
            border-bottom: 1px solid var(--glass-border);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-logo {
            font-weight: 800;
            font-size: 1.5rem; /* Increased from 1.2rem */
            color: var(--primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-links {
            display: flex;
            gap: 32px; /* Increased gap */
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 1.1rem; /* Increased from 0.95rem */
            font-weight: 600;
            transition: 0.3s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--primary);
        }

        .page-content {
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--container-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header { margin-bottom: 30px; }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--primary);
            background: linear-gradient(to right, #4f46e5, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle { color: var(--text-muted); font-size: 1rem; }

        /* Drop Zone */
        .drop-zone {
            border: 2px dashed #cbd5e1;
            border-radius: 16px;
            padding: 40px 20px;
            background: var(--drop-zone-bg);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            margin-bottom: 20px;
        }

        .drop-zone:hover, .drop-zone.drag-over {
            border-color: var(--primary);
            background: #eef2ff;
        }

        .drop-zone i { font-size: 48px; color: var(--primary); margin-bottom: 16px; }

        .drop-zone p { font-weight: 500; color: var(--text-main); }

        #pdf-input {
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0;
            opacity: 0; cursor: pointer;
        }

        /* Status & Actions */
        #status-container { margin: 20px 0; display: none; }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #eef2ff;
            border: 1px solid #c7d2fe;
            border-radius: 100px;
            font-size: 0.9rem;
            color: var(--primary);
        }

        .loader {
            width: 16px; height: 16px;
            border: 2px solid #c7d2fe;
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .btn-convert {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-convert:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .btn-convert:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

        /* Diagnostics UI */
        .diagnostic-info {
            margin-top: 30px;
            padding: 15px;
            background: #f1f5f9;
            border-radius: 12px;
            font-size: 0.8rem;
            text-align: left;
        }

        .diag-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .status-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }

        .dot-success { background: var(--success); }
        .dot-error { background: var(--error); }

        footer { margin-top: auto; padding: 40px 0; color: var(--text-muted); font-size: 0.9rem; }

    </style>
</head>
<body>

<nav class="main-nav">
    <a href="index.html" class="nav-logo">
        <i class="ph ph-lightning-fill"></i>
        <span>Kiyubi Converter</span>
    </a>
    <div class="nav-links">
        <a href="index.html">Beranda</a>
        <a href="converter.html">PDF ke JPG</a>
        <a href="pdftoword.html" class="active">PDF ke Word</a>
    </div>
</nav>

<div class="page-content">
    <div class="container">
        <header>
            <h1>PDF ke Word</h1>
            <p class="subtitle">Ekstrak teks dari PDF Anda menjadi file Word yang dapat diedit.</p>
        </header>

        <div class="drop-zone" id="drop-zone">
            <i class="ph ph-file-doc"></i>
            <p id="file-name">Klik atau Seret PDF ke Sini</p>
            <input type="file" id="pdf-input" accept="application/pdf">
        </div>

        <div id="status-container">
            <div class="status-badge">
                <div class="loader" id="loader"></div>
                <span id="status-text">Menunggu...</span>
            </div>
        </div>

        <button id="convert-btn" class="btn-convert">
            <i class="ph ph-magic-wand"></i> Konversi Sekarang
        </button>

        <!-- Diagnostic Panel -->
        <div class="diagnostic-info">
            <p style="font-weight: bold; margin-bottom: 10px;">Status Sistem:</p>
            <div class="diag-item">
                <span>PDF.js Engine:</span>
                <span><span id="diag-pdf" class="status-dot"></span> <span id="text-pdf">Checking...</span></span>
            </div>
            <div class="diag-item">
                <span>Word Engine:</span>
                <span><span id="diag-word" class="status-dot"></span> <span id="text-word">Checking...</span></span>
            </div>
        </div>
    </div>
</div>

<footer>
    <p>&copy; 2026 Kiyubi Converter. Dibuat dengan &hearts;</p>
</footer>

<script>
    const input = document.getElementById('pdf-input');
    const dropZone = document.getElementById('drop-zone');
    const btn = document.getElementById('convert-btn');
    const statusContainer = document.getElementById('status-container');
    const statusText = document.getElementById('status-text');
    const loader = document.getElementById('loader');
    const fileNameText = document.getElementById('file-name');

    let pdfFile = null;

    // Diagnostic Check
    function runDiagnostics() {
        const diagPdf = document.getElementById('diag-pdf');
        const textPdf = document.getElementById('text-pdf');
        const diagWord = document.getElementById('diag-word');
        const textWord = document.getElementById('text-word');

        // Check PDF.js
        const pdfEngine = window['pdfjs-dist/build/pdf'] || window.pdfjsLib;
        if (pdfEngine) {
            diagPdf.className = 'status-dot dot-success';
            textPdf.textContent = 'Siap';
            // Global assignment if not already done
            if (typeof pdfjsLib === 'undefined') window.pdfjsLib = pdfEngine;
        } else {
            diagPdf.className = 'status-dot dot-error';
            textPdf.textContent = 'Gagal Dimuat';
        }

        // Check docx
        const wordEngine = window.docx || docx;
        if (typeof wordEngine !== 'undefined') {
            diagWord.className = 'status-dot dot-success';
            textWord.textContent = 'Siap';
        } else {
            diagWord.className = 'status-dot dot-error';
            textWord.textContent = 'Gagal Dimuat';
        }
    }

    window.onload = () => {
        runDiagnostics();
        // Re-check after 2 seconds in case CDN is slow
        setTimeout(runDiagnostics, 2000);
    };

    input.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) handleFileSelection(file);
    });

    // Drag & Drop logic
    ['dragenter', 'dragover'].forEach(name => {
        dropZone.addEventListener(name, (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    });
    ['dragleave', 'drop'].forEach(name => {
        dropZone.addEventListener(name, (e) => { e.preventDefault(); dropZone.classList.remove('drag-over'); });
    });

    function handleFileSelection(file) {
        pdfFile = file;
        fileNameText.textContent = file.name;
        btn.style.display = 'flex';
        statusContainer.style.display = 'block';
        statusText.textContent = "File siap. Klik konversi.";
        loader.style.display = 'none';
    }

    btn.addEventListener('click', async () => {
        btn.disabled = true;
        loader.style.display = 'block';
        
        try {
            // STEP 1: Cek Library
            statusText.textContent = "Menyiapkan sistem...";
            const wordLib = window.docx || docx;
            const pdfLib = window['pdfjs-dist/build/pdf'] || window.pdfjsLib;

            if (typeof pdfLib === 'undefined') throw new Error("Sistem PDF tidak siap (Library missing).");
            if (typeof wordLib === 'undefined') throw new Error("Sistem Word tidak siap (Library missing).");

            // STEP 2: Baca File
            statusText.textContent = "Membaca file...";
            const arrayBuffer = await pdfFile.arrayBuffer();
            
            // Konfigurasi Worker secara manual
            pdfLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

            // STEP 3: Muat PDF
            statusText.textContent = "Membuka PDF...";
            const loadingTask = pdfLib.getDocument({data: arrayBuffer});
            const pdf = await loadingTask.promise;
            
            let sections = [];

            // STEP 4: Ekstraksi Teks (Smart Layout)
            for (let i = 1; i <= pdf.numPages; i++) {
                statusText.textContent = `Mengekstrak Halaman ${i}/${pdf.numPages}...`;
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                
                // Urutkan teks berdasarkan posisi (Y descending, lalu X ascending)
                const items = textContent.items.sort((a, b) => {
                    if (Math.abs(a.transform[5] - b.transform[5]) < 5) {
                        return a.transform[4] - b.transform[4];
                    }
                    return b.transform[5] - a.transform[5];
                });

                let lastY = -1;
                let lastX = -1;
                let lastWidth = 0;
                let lineText = "";
                
                items.forEach(item => {
                    const currentX = item.transform[4];
                    const currentY = item.transform[5];
                    
                    if (lastY !== -1 && Math.abs(currentY - lastY) > 8) {
                        // Baris baru detect
                        if (lineText.trim().length > 0) {
                            sections.push(new wordLib.Paragraph({
                                children: [new wordLib.TextRun({ 
                                    text: lineText, 
                                    size: 22, 
                                    font: "Arial" 
                                })],
                                alignment: wordLib.AlignmentType.JUSTIFIED,
                                spacing: { before: 40, after: 40, line: 360 }
                            }));
                        }
                        lineText = "";
                        lastX = -1;
                    }

                    // Smart Spacing: Deteksi celah horizontal besar
                    if (lastX !== -1) {
                        const gap = currentX - (lastX + lastWidth);
                        if (gap > 30) {
                            lineText += "    "; // Simulasi Tab
                        } else if (gap > 5) {
                            lineText += " ";
                        }
                    }

                    lineText += item.str;
                    lastY = currentY;
                    lastX = currentX;
                    // pdf.js item.width adalah lebar teks dalam unit PDF
                    lastWidth = item.width || (item.str.length * 6); 
                });

                // Sisa teks halaman
                if (lineText.trim().length > 0) {
                    sections.push(new wordLib.Paragraph({
                        children: [new wordLib.TextRun({ text: lineText, size: 22, font: "Arial" })],
                        alignment: wordLib.AlignmentType.JUSTIFIED,
                        spacing: { before: 40, after: 40, line: 360 }
                    }));
                }
                
                // Tambahkan Page Break antar halaman PDF
                if (i < pdf.numPages) {
                    sections.push(new wordLib.Paragraph({
                        children: [],
                        pageBreakBefore: true
                    }));
                }
            }

            if (sections.length === 0) throw new Error("Tidak ada teks yang bisa diambil. Apakah ini PDF gambar?");

            // STEP 5: Membuat Word dengan A4 & Margin Presisi
            statusText.textContent = "Membangun dokumen Word...";
            const doc = new wordLib.Document({
                sections: [{
                    properties: {
                        page: {
                            size: {
                                width: 11906, // A4 Width in twips
                                height: 16838, // A4 Height in twips
                            },
                            margin: {
                                top: 1440, right: 1440, bottom: 1440, left: 1440,
                            },
                        },
                    },
                    children: sections
                }]
            });

            const blob = await docx.Packer.toBlob(doc);
            
            // STEP 6: Download
            statusText.textContent = "Mengunduh hasil...";
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Konversi-${Date.now()}.docx`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);

            statusText.textContent = "Selesai! Periksa folder download.";
            loader.style.display = 'none';

        } catch (error) {
            console.error("DEBUG:", error);
            statusText.textContent = "Gagal: " + error.message;
            loader.style.display = 'none';
        } finally {
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
